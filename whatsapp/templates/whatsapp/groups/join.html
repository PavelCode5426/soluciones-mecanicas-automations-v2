{% extends 'layout/admin_layout.html' %}
{% load django_bootstrap5 %}
{% load static %}

{% block title %}Unirse a un grupo{% endblock %}

{% block page_content %}
    <div class="container-md">
        <form class="card" method="post">
            {% csrf_token %}
            <div class="card-header bg-primary">
                <h4 class="card-title text-white">¿Desea unirse a un grupo?</h4>
            </div><!--end card-header-->
            <div class="card-body">
                <p class="card-text text-muted">Al confirmar se unira</p>
                {% bootstrap_form form %}
            </div><!--end card-body-->
            <p class="card-footer m-0">
                <input class="btn btn-primary" type="submit" value="Unirse al grupo">
                <a class="btn" href="{{ cancel_url }}">Cancelar</a>
            </p>
        </form>
    </div>
{% endblock %}
