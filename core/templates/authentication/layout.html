{% extends 'layout/layout.html' %}
{% load static %}
{% load django_bootstrap5 %}

{% block body %}
    <body id="body" class="auth-page"
          style="background-image: url('{% static 'images/login-background.jpg' %}'); background-size: cover; background-position: center center;">
    <div class="container-md">
        <div class="row vh-100 d-flex justify-content-center">
            <div class="col-12 align-self-center">
                <div class="card-body">
                    <div class="row">
                        <div class="col-lg-4 mx-auto">
                            <div class="card">
                                {% block card %}
                                    <div class="card-body p-0 auth-header-box">
                                        {% block card_header %}
                                            <div class="text-center p-3">
                                                <a class="logo logo-admin">
                                                    <img src="{% static 'images/logo-white.png' %}" height="50"
                                                         alt="logo" class="auth-logo">
                                                </a>
                                                <h4 class="mt-3 mb-1 fw-semibold text-white font-18">Iniciar Sesión</h4>
                                                <p class="text-muted  mb-0">Introduzca sus credenciales para entrar al
                                                    sistema</p>
                                            </div>
                                        {% endblock %}
                                    </div>
                                    <div class="card-body pt-0">
                                        {% block card_body %}
                                        {% endblock %}
                                    </div>
                                {% endblock %}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
{% endblock %}
