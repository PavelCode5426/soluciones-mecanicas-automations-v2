{% extends 'authentication/layout.html' %}
{% load static %}
{% load django_bootstrap5 %}


{% block card_header %}
    <div class="text-center p-3">
        <a class="logo logo-admin">
            <img src="{% static 'images/logo-white.png' %}" height="50" alt="logo" class="auth-logo">
        </a>
        <h4 class="mt-3 mb-1 fw-semibold text-white font-18">{{ title }}</h4>
        <p class="text-muted  mb-0">Introduzca su correo y se le enviaran las intrucciones</p>
    </div>
{% endblock %}

{% block card_body %}
    <form class="my-4" method="post">
        {% csrf_token %}
        <div class="form-group mb-2">
            {% bootstrap_field form.email %}
        </div>

        <div class="form-group mb-0 row">
            <div class="col-12">
                <div class="d-grid mt-3">
                    <button class="btn btn-primary" type="submit">Restablecer <i class="fas fa-sign-in-alt ms-1"></i></button>
                </div>
            </div>
        </div>
    </form>
{% endblock %}
